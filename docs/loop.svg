<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c084fc"/>
    </marker>
  </defs>

  <rect width="720" height="480" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">The Strange Loop</text>

  <!-- Session N box -->
  <rect x="40" y="70" width="200" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="140" y="98" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Session N</text>
  <text x="140" y="118" text-anchor="middle" fill="#8b949e" font-size="11">conversation happens</text>

  <!-- Hook fires -->
  <rect x="260" y="70" width="200" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="360" y="98" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">SessionEnd Hook</text>
  <text x="360" y="118" text-anchor="middle" fill="#8b949e" font-size="11">same model summarizes</text>

  <!-- Arrow: Session N → Hook -->
  <line x1="240" y1="106" x2="256" y2="106" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Summary box -->
  <rect x="480" y="70" width="200" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="580" y="93" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Plan / Done / Open</text>
  <text x="580" y="113" text-anchor="middle" fill="#8b949e" font-size="11">structured markdown</text>
  <text x="580" y="129" text-anchor="middle" fill="#8b949e" font-size="11">written to vault</text>

  <!-- Arrow: Hook → Summary -->
  <line x1="460" y1="106" x2="476" y2="106" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vault / Index box (center) -->
  <rect x="220" y="190" width="280" height="72" rx="8" fill="#1c1238" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="360" y="218" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="600">Searchable Index</text>
  <text x="360" y="238" text-anchor="middle" fill="#8b949e" font-size="11">BM25 over all session logs</text>

  <!-- Arrow: Summary → Index -->
  <path d="M580,142 L580,226 L504,226" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Session N+1 box -->
  <rect x="40" y="310" width="200" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="140" y="338" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Session N+1</text>
  <text x="140" y="358" text-anchor="middle" fill="#8b949e" font-size="11">blank context window</text>

  <!-- Arrow: Index → Session N+1 (reads past) -->
  <path d="M220,226 L140,226 L140,306" fill="none" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
  <text x="90" y="270" fill="#c084fc" font-size="10" font-style="italic">reads own past</text>

  <!-- Session N+1 summarized -->
  <rect x="260" y="310" width="200" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="360" y="338" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">SessionEnd Hook</text>
  <text x="360" y="358" text-anchor="middle" fill="#8b949e" font-size="11">summarizes N+1</text>

  <!-- Arrow: N+1 → Hook -->
  <line x1="240" y1="346" x2="256" y2="346" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- N+1 summary includes N -->
  <rect x="480" y="310" width="200" height="72" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="580" y="333" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Plan / Done / Open</text>
  <text x="580" y="353" text-anchor="middle" fill="#8b949e" font-size="11">now contains traces</text>
  <text x="580" y="369" text-anchor="middle" fill="#8b949e" font-size="11">of session N</text>

  <!-- Arrow: Hook → Summary N+1 -->
  <line x1="460" y1="346" x2="476" y2="346" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Recurse arrow back up to index -->
  <path d="M580,382 L580,420 L700,420 L700,226 L504,226" fill="none" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-accent)"/>

  <!-- Lossy compression label -->
  <text x="700" y="330" text-anchor="middle" fill="#c084fc" font-size="10" font-style="italic" transform="rotate(-90, 700, 330)">lossy compression at each layer</text>

  <!-- Session N+2 hint -->
  <text x="360" y="456" text-anchor="middle" fill="#484f58" font-size="12" font-style="italic">Session N+2 reads a summary of a summary...</text>
  <text x="360" y="472" text-anchor="middle" fill="#484f58" font-size="11">what remains is not the conversation but its shape</text>
</svg>
